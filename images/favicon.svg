<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="48" fill="#0D2247"/>
  
  <!-- Outer Dotted Circle (kept glowing and pure gold) -->
  <g filter="url(#glow)">
    <circle cx="50" cy="50" r="42" stroke="#FFD700" stroke-width="4" stroke-dasharray="8 6"/>
  </g>
  <circle cx="50" cy="50" r="42" stroke="#FFFDE7" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- The N letter (Reverted to original thickness and coordinates, kept shining) -->
  <g filter="url(#glow)">
    <path d="M35 70V30L65 70V30" stroke="#FFD700" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Thin bright core to maintain crispness at small sizes -->
  <path d="M35 70V30L65 70V30" stroke="#FFFDE7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
